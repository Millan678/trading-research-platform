# Trading Research Platform — Configuration

[platform]
name = "Trading Research Platform"
version = "1.0.0"
phase_coverage = "1-64"
research_only = true
advisory_only = true

[safety]
forbidden_operations = [
    "live_trading",
    "broker_execution",
    "order_placement",
    "automatic_deployment",
    "production_modification",
    "automatic_strategy_approval",
    "governance_bypass",
    "evaluation_bypass",
]
enforcement = "RuntimeError"

[storage]
primary = "sqlite"
fallback = "postgresql"
mirror = "json"
append_only = true
sha256 = true

[backup]
timestamped = true
sha256_manifest = true
exclude = ["backups", ".git", "venv", "node_modules", "__pycache__"]
never_recursive = true
