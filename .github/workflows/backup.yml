name: Weekly Backup

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday 02:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create SHA-256 manifest
        run: |
          python scripts/backup.py manifest

      - name: Create timestamped archive
        run: |
          python scripts/backup.py archive

      - name: Verify backup integrity
        run: |
          python scripts/backup.py verify

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: backups/
          retention-days: 90

      - name: Report
        if: always()
        run: |
          echo "Backup complete"
          cat backups/latest_manifest.sha256 || echo "Manifest not found"
